version: '3.8'

services:
  app:
    build:
      context: ./src
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    volumes:
      - ./src:/var/www/html
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
      - DB_CONNECTION=pgsql
      - DB_PORT=5432
      - DB_DATABASE=mcp_ai
      - DB_USERNAME=user
      - DB_PASSWORD=password
    command: php artisan serve --host=0.0.0.0 --port=8000

  worker:
    build: ./src
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=1200
    depends_on:
      - app
      - redis
      - db
    volumes:
      - ./src:/var/www/html
    restart: always
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
      - DB_CONNECTION=pgsql
      - DB_PORT=5432
      - DB_DATABASE=mcp_ai
      - DB_USERNAME=user
      - DB_PASSWORD=password

  horizon:
    build: ./src
    command: php artisan horizon
    depends_on:
      - app
      - redis
      - db
    volumes:
      - ./src:/var/www/html
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
      - DB_CONNECTION=pgsql
      - DB_PORT=5432
      - DB_DATABASE=mcp_ai
      - DB_USERNAME=user
      - DB_PASSWORD=password

  scheduler:
    build: ./src
    command: php artisan schedule:work
    depends_on:
      - app
      - redis
      - db
    volumes:
      - ./src:/var/www/html
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
      - DB_CONNECTION=pgsql
      - DB_PORT=5432
      - DB_DATABASE=mcp_ai
      - DB_USERNAME=user
      - DB_PASSWORD=password

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: mcp_ai
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  adminer:
    image: adminer:latest
    ports:
      - "8080:8080"
    depends_on:
      - db

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  ollama-pull-models:
    image: curlimages/curl:latest
    depends_on:
      - ollama
    entrypoint: [ "sh", "-c", "curl -X POST http://ollama:11434/api/pull -d '{\"name\": \"llama3.1\"}' && curl -X POST http://ollama:11434/api/pull -d '{\"name\": \"nomic-embed-text\"}'" ]

volumes:
  postgres_data:
  ollama_data:
